name: sugobay_app
description: "SugoBay - Sugo para sa tanan sa Ubay"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.0.0
  flutter_dotenv: ^5.2.1
  go_router: ^13.0.0
  flutter_map: ^6.2.1
  firebase_messaging: ^14.0.0
  firebase_core: ^2.24.0
  geolocator: ^11.0.0
  image_picker: ^1.0.0
  latlong2: ^0.9.1
  cached_network_image: ^3.3.0
  flutter_riverpod: ^2.4.0
  intl: ^0.19.0
  url_launcher: ^6.2.0
  photo_view: ^0.15.0
  shimmer: ^3.0.0
  flutter_local_notifications: ^17.0.0
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/
    - assets/images/
